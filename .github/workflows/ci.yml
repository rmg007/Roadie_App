name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Audit E2E command coverage
        run: node scripts/audit-e2e-coverage.js --report-only
        continue-on-error: true  # monitor-only until D1 coverage reaches 100%

      - name: Check for `as any` violations (A5 gate)
        run: |
          # Grep for ' as any' in src/ (excluding test dirs and the allowed 'as typeof import' pattern)
          if grep -rn " as any" src/ \
            --include="*.ts" \
            --exclude="*.test.ts" \
            --exclude-dir=__integration__ \
            --exclude-dir=__perf__ \
            --exclude-dir=__contract__; then
            echo "❌ Found 'as any' casts in production code (A5 gate violation)"
            exit 1
          else
            echo "✅ No 'as any' casts found in production code"
          fi

      - name: Audit dependencies (H2 gate)
        run: npm audit --audit-level=high

      - name: Upload coverage (optional, for trend analysis)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7
