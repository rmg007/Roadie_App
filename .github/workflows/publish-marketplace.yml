name: Publish VS Code Extension

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    name: Publish to VS Code Marketplace
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=moderate

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version (v$TAG_VERSION) does not match package.json version ($PKG_VERSION)."
            exit 1
          fi

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Lint
        run: npm run lint

      - name: Build extension
        run: npm run build

      - name: Smoke test bundle
        run: node scripts/smoke-test-bundle.js

      - name: Package VSIX
        run: npx @vscode/vsce package --no-dependencies

      - name: Dry-run publish
        run: npx @vscode/vsce publish --no-dependencies --dry-run || true

      # Publisher verification: @vscode/vsce validates the publisher token against
      # the VS Code Marketplace during publish. No additional signing step is needed;
      # the VSCE_PAT secret acts as the publisher credential.
      - name: Generate SBOM
        run: node scripts/generate-sbom.js

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.ref_name }}
          path: sbom.json

      - name: Publish to Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "Missing VSCE_PAT secret. Add it in GitHub repo settings before publishing."
            exit 1
          fi
          npx @vscode/vsce publish --no-dependencies -p "$VSCE_PAT"
