name: Scenario Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  scenarios:
    name: Run scenario tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: roadie/package-lock.json

      - name: Install dependencies
        working-directory: roadie
        run: npm ci

      - name: Run unit tests
        working-directory: roadie
        run: npm test

      - name: Run scenario tests
        working-directory: roadie
        run: npm run test:scenarios
